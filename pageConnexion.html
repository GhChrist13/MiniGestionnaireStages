<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion - Mini Gestionnaire de Stages</title>
    <link rel="stylesheet" href="connection.css" />
    <!-- Font Awesome pour les icônes -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        /* Styles spécifiques pour l'input avec icône œil */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input[type="password"],
        .password-wrapper input[type="text"] {
            width: 100%;
            padding-right: 40px;
            /* espace pour l'icône */
            box-sizing: border-box;
        }

        .password-wrapper .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 18px;
            user-select: none;
        }

        .password-wrapper .toggle-password:hover {
            color: #007bff;
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <h1>Connexion</h1>
            <nav>
                <a href="index.html">Accueil</a>
                <a href="register.html">S’inscrire</a>
            </nav>
        </div>
       
        </div>
        
    </header>

    <main class="container">
        <section class="intro">
            <h2>Bienvenue sur la plateforme</h2>
            <p>Veuillez vous connecter pour accéder à votre tableau de bord étudiant.</p>
        </section>

        <section>
            <form action="login.php" method="post" class="form-box">
                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" required placeholder="ex: etudiant@mail.com" />
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required
                            placeholder="Votre mot de passe" />
                        <i id="togglePassword" class="far fa-eye toggle-password"
                            title="Afficher / masquer le mot de passe"></i>
                    </div>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn">Se connecter</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Mini Gestionnaire de Stages - Projet SLAM & CIEL</p>
        </div>
    </footer>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            // Alterner le type d'input
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Changer l'icône
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });
    </script>

</body>

</html>
