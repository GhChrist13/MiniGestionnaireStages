<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inscription - Mini Gestionnaire de Stages</title>
    <link rel="stylesheet" href="inscription.css" />
</head>

<body>

    <div class="container">
        <h1>Créer un compte</h1>

        <!-- Message d'erreur ou succès (à afficher dynamiquement via PHP ou JS) -->
        <!-- <div class="message error">Erreur lors de l'inscription</div> -->
        <!-- <div class="message success">Inscription réussie !</div> -->

        <form action="register.php" method="POST" novalidate>
            <div class="form-group">
                <label for="lastname">Nom</label>
                <input type="text" id="lastname" name="lastname" placeholder="Votre nom" required />
            </div>

            <div class="form-group">
                <label for="firstname">Prénom</label>
                <input type="text" id="firstname" name="firstname" placeholder="Votre prénom" required />
            </div>

            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" placeholder="exemple@mail.com" required />
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Votre mot de passe" required
                    minlength="6" />
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirmer le mot de passe</label>
                <input type="password" id="passwordConfirm" name="passwordConfirm"
                    placeholder="Confirmez votre mot de passe" required minlength="6" />
            </div>

            <button type="submit">S’inscrire</button>
        </form>

        <div class="form-footer">
            <p>Vous avez déjà un compte ? <a href="connexion.html">Se connecter</a></p>
        </div>
    </div>

</body>

</html>
